name: Download Kaggle Dataset
on:
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Kaggle dataset slug (e.g. marquis03/bdd100k)'
        required: true
        default: 'marquis03/bdd100k'
  # schedule:
  #   - cron: '0 3 * * 0'

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Download dataset (unzipped)
        run: |
          mkdir -p data
          kaggle datasets download \
            -d "${{ github.event.inputs.dataset }}" \
            -p data \
            --unzip \
            --force

      - name: Commit in ~100MB batches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BATCH_LIMIT=$((100 * 1024 * 1024))  # 100MB in bytes
          batch_size=0
          batch_num=1
          files_in_batch=()

          # Only new/untracked/modified files under data/
          while IFS= read -r -d '' file; do
            file_size=$(stat -c%s "$file")

            # if a single file already exceeds the limit, commit it alone
            if [ "$file_size" -gt "$BATCH_LIMIT" ]; then
              if [ ${#files_in_batch[@]} -gt 0 ]; then
                git add "${files_in_batch[@]}"
                git commit -m "Add dataset batch $batch_num (${{ github.event.inputs.dataset }})"
                batch_num=$((batch_num + 1))
                files_in_batch=()
                batch_size=0
              fi
              git add "$file"
              git commit -m "Add large file $(basename "$file") (${{ github.event.inputs.dataset }})"
              continue
            fi

            files_in_batch+=("$file")
            batch_size=$((batch_size + file_size))

            if [ "$batch_size" -ge "$BATCH_LIMIT" ]; then
              git add "${files_in_batch[@]}"
              git commit -m "Add dataset batch $batch_num (${{ github.event.inputs.dataset }})"
              batch_num=$((batch_num + 1))
              files_in_batch=()
              batch_size=0
            fi
          done < <(git -C . status --porcelain -z -- data | grep -z -E '^(\?\?|.M| M)' | cut -z -c4- | tr '\0' '\0')

          # commit any remaining files under the limit
          if [ ${#files_in_batch[@]} -gt 0 ]; then
            git add "${files_in_batch[@]}"
            git commit -m "Add dataset batch $batch_num (${{ github.event.inputs.dataset }})"
          fi

          echo "Pushing all batch commits..."
          git push
